name: Publish Evaluation Reports

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "datasets/**"
      - "docs/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Semantic Eval (Tier 2 — DeepEval · RAGAS)", "Adversarial Red-Team"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build report site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (all extras including report)
        run: uv sync --frozen --all-extras

      - name: Restore published trend history
        env:
          PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p reports/trends
          for tier in deterministic semantic adversarial; do
            curl -fsSL "$PAGES_BASE/trends-data/$tier.jsonl" \
              -o "reports/trends/$tier.jsonl" || {
              echo "::warning::Trend history for $tier could not be restored; report site may show stale or missing trend inputs."
            }
          done

      - name: Run hermetic test suites (unit + deterministic + adversarial)
        env:
          PYTHONPATH: src
        run: |
          uv run pytest tests/unit/ tests/deterministic/ tests/adversarial/ \
            -m "not live" \
            --alluredir reports/allure-results \
            -v --tb=short

      - name: Download latest semantic eval artifact
        id: download_semantic
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151  # v21
        continue-on-error: true
        with:
          workflow: semantic-eval.yml
          name: semantic-eval-reports
          path: reports/
          if_no_artifact_found: warn

      - name: Download latest adversarial report artifact
        id: download_adversarial
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151  # v21
        continue-on-error: true
        with:
          workflow: adversarial.yml
          name: adversarial-reports
          path: reports/
          if_no_artifact_found: warn

      - name: Warn on missing live report inputs
        if: steps.download_semantic.outcome == 'failure' || steps.download_adversarial.outcome == 'failure'
        run: |
          if [ "${{ steps.download_semantic.outcome }}" = "failure" ]; then
            echo "::warning::Semantic report artifact was not downloaded; report site may use stale or missing live inputs."
          fi
          if [ "${{ steps.download_adversarial.outcome }}" = "failure" ]; then
            echo "::warning::Adversarial report artifact was not downloaded; report site may use stale or missing live inputs."
          fi

      - name: Generate defects-caught report
        env:
          PYTHONPATH: src:.
        run: uv run python scripts/defects_report.py

      - name: Set up Java for Allure CLI
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        env:
          ALLURE_SHA256: 81ab0e54308dc6e665c9e0db96857a88be830089c73c45c702f9df51fa23fa00
        run: |
          curl -sLo allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          echo "${ALLURE_SHA256}  allure.tgz" | sha256sum -c -
          tar -xzf allure.tgz
          echo "$PWD/allure-2.27.0/bin" >> "$GITHUB_PATH"

      - name: Generate Allure HTML report
        run: allure generate reports/allure-results --clean -o reports/allure-report
        continue-on-error: true

      - name: Build static report site
        env:
          PYTHONPATH: src:.
        run: uv run python scripts/build_report_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
