name: Semantic Eval (Tier 2 — DeepEval · RAGAS)

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to use (zai, openrouter, together, nvidia, google)"
        required: false
        default: "openrouter"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-eval:
    name: Tier 2 — Semantic Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # No-op when the required secret is absent (fork PRs, repos without key)
    env:
      VERITY_ZAI_API_KEY: ${{ secrets.VERITY_ZAI_API_KEY }}
      VERITY_OPENROUTER_API_KEY: ${{ secrets.VERITY_OPENROUTER_API_KEY }}
      VERITY_TOGETHER_API_KEY: ${{ secrets.VERITY_TOGETHER_API_KEY }}
      VERITY_NVIDIA_API_KEY: ${{ secrets.VERITY_NVIDIA_API_KEY }}
      VERITY_GOOGLE_API_KEY: ${{ secrets.VERITY_GOOGLE_API_KEY }}
      VERITY_PROVIDER: ${{ inputs.provider || 'openrouter' }}
      VERITY_SEMANTIC_SAMPLES: ${{ github.event_name == 'schedule' && '5' || '1' }}
      VERITY_TEMPERATURE: ${{ github.event_name == 'schedule' && '0.6' || '0.0' }}
      DEEPEVAL_TELEMETRY_OPT_OUT: "1"
      DEEPEVAL_ERROR_REPORTING_OPT_OUT: "1"
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with semantic extras)
        run: uv sync --frozen --all-extras

      - name: Check provider key
        id: key_check
        run: |
          case "$VERITY_PROVIDER" in
            zai) required_key="$VERITY_ZAI_API_KEY"; required_name="VERITY_ZAI_API_KEY" ;;
            openrouter) required_key="$VERITY_OPENROUTER_API_KEY"; required_name="VERITY_OPENROUTER_API_KEY" ;;
            together) required_key="$VERITY_TOGETHER_API_KEY"; required_name="VERITY_TOGETHER_API_KEY" ;;
            nvidia) required_key="$VERITY_NVIDIA_API_KEY"; required_name="VERITY_NVIDIA_API_KEY" ;;
            google) required_key="$VERITY_GOOGLE_API_KEY"; required_name="VERITY_GOOGLE_API_KEY" ;;
            *) echo "::error::Unsupported VERITY_PROVIDER: $VERITY_PROVIDER"; exit 1 ;;
          esac

          if [ -z "$VERITY_ZAI_API_KEY$VERITY_OPENROUTER_API_KEY$VERITY_TOGETHER_API_KEY$VERITY_NVIDIA_API_KEY$VERITY_GOOGLE_API_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No provider key secret configured; skipping semantic eval"
          elif [ -z "$required_key" ]; then
            echo "::error::$required_name is required when VERITY_PROVIDER=$VERITY_PROVIDER"
            exit 1
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Index corpus
        if: steps.key_check.outputs.has_key == 'true'
        run: |
          uv run python -c "
          import warnings; warnings.filterwarnings('ignore')
          from sut.retriever import PolicyRetriever
          from verity.config import RetrievalConfig
          r = PolicyRetriever(RetrievalConfig())
          n = r.index_corpus()
          print(f'Indexed {n} chunks')
          "

      - name: Run semantic eval
        if: steps.key_check.outputs.has_key == 'true'
        run: |
          mkdir -p reports/allure-results/semantic reports/semantic
          uv run pytest tests/semantic/ -m semantic -v --tb=short \
            --alluredir reports/allure-results/semantic
          if [ ! -s reports/semantic/results-local.json ]; then
            echo "::error::Semantic eval completed without reports/semantic/results-local.json; no eval cases ran."
            exit 1
          fi
          cp reports/semantic/results-local.json reports/semantic/results.json

      - name: Upload semantic eval reports
        if: steps.key_check.outputs.has_key == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: semantic-eval-reports
          path: |
            reports/allure-results/semantic/
            reports/semantic/results.json
          if-no-files-found: warn
