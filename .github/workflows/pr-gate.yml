name: PR Gate (Tier 1 — lint · type · unit)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint · Type · Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy strict
        run: uv run mypy src

      - name: Unit + Deterministic tests (no live calls)
        run: uv run pytest -m "not live" --cov=src --cov-report=term-missing --cov-fail-under=80
        env:
          # No API keys — live tests excluded via marker
          PYTHONPATH: src

      - name: Dependency vulnerability scan
        run: |
          uv run pip-audit --desc \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2026-6587

      - name: Static security scan (medium/high only)
        run: uv run bandit -r src/ -ll -c pyproject.toml
