name: PR Gate (Tier 1 — lint · type · unit)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint · Type · Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras --python ${{ matrix.python-version }}

      - name: Cache Chroma ONNX embedding model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/chroma/onnx_models
          key: chroma-onnx-${{ runner.os }}-py${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check src tests scripts promptfoo

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts promptfoo

      - name: mypy strict
        run: uv run mypy src

      - name: Unit + Deterministic tests (no live calls)
        run: |
          uv run pytest -m "not live" -n auto --cov=src --cov-report=term-missing \
            --cov-report=json:reports/coverage.json --cov-fail-under=80
        env:
          # No API keys — live tests excluded via marker
          PYTHONPATH: src

      - name: Module-sensitive coverage gate (agent, retrieval, metrics, tracing, reporting)
        run: uv run python scripts/check_module_coverage.py reports/coverage.json

      - name: Hermetic Tier-2/3 evidence gate (no API key — cassette replay only)
        # Smoke-tests that the calibration and defects-report pipelines run
        # end-to-end without a provider key. --out writes calibration to a
        # scratch path rather than docs/calibration-report.md, which holds
        # committed evidence from an actual live run (see README Limitations)
        # that this hermetic smoke run must not overwrite.
        run: |
          PYTHONPATH=src uv run python scripts/run_calibration.py --out /tmp/calibration-hermetic-check.md
          PYTHONPATH=src:. uv run python scripts/defects_report.py

      - name: Regenerated docs match committed copies
        # defects_report.py above overwrites docs/defects-caught.md in place;
        # a hand-edit to the committed doc that isn't mirrored in the
        # generator would otherwise pass silently until someone runs the
        # regenerate command locally and finds it reverted.
        run: git diff --exit-code docs/defects-caught.md

      - name: Vulnerability exception expiry check
        run: uv run python scripts/check_vuln_exceptions.py

      - name: Dependency vulnerability scan
        run: |
          ignore_args=()
          while IFS= read -r id; do
            ignore_args+=(--ignore-vuln "$id")
          done < <(grep -vE '^\s*(#|$)' .pip-audit-ignore)
          uv run pip-audit --desc "${ignore_args[@]}"

      - name: Secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.28.0 \
            detect --source /repo --redact --verbose

      - name: Static security scan (medium/high only)
        run: uv run bandit -r src/ -ll -c pyproject.toml
