name: PR Gate (Tier 1 — lint · type · unit)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint · Type · Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Cache Chroma ONNX embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma/onnx_models
          key: chroma-onnx-${{ runner.os }}

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: mypy strict
        run: uv run mypy src

      - name: Unit + Deterministic tests (no live calls)
        run: |
          uv run pytest -m "not live" --cov=src --cov-report=term-missing \
            --cov-report=json:reports/coverage.json --cov-fail-under=80
        env:
          # No API keys — live tests excluded via marker
          PYTHONPATH: src

      - name: Module-sensitive coverage gate (agent, retrieval, metrics, tracing, reporting)
        run: uv run python scripts/check_module_coverage.py reports/coverage.json

      - name: Dependency vulnerability scan
        run: |
          ignore_args=()
          while IFS= read -r id; do
            ignore_args+=(--ignore-vuln "$id")
          done < <(grep -vE '^\s*(#|$)' .pip-audit-ignore)
          uv run pip-audit --desc "${ignore_args[@]}"

      - name: Static security scan (medium/high only)
        run: uv run bandit -r src/ -ll -c pyproject.toml
