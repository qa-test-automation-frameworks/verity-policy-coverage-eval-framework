name: Adversarial Red-Team

on:
  schedule:
    # Weekly: every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  key_check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.VERITY_ZAI_API_KEY }}${{ secrets.VERITY_OPENROUTER_API_KEY }}${{ secrets.VERITY_TOGETHER_API_KEY }}${{ secrets.VERITY_NVIDIA_API_KEY }}${{ secrets.VERITY_GOOGLE_API_KEY }}" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

  redteam-hermetic:
    needs: key_check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      # Hermetic checks install only the base dependency set; live extras run in separate jobs.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Hermetic adversarial suite
        run: |
          mkdir -p reports/allure-results/adversarial
          PYTHONPATH=src uv run pytest tests/adversarial/ -m adversarial -v \
            --alluredir reports/allure-results/adversarial
          if [ -f reports/security/summary-local.json ]; then
            cp reports/security/summary-local.json reports/security/summary.json
            cp reports/security/summary-local.md reports/security/summary.md
          fi

      - name: Upload adversarial reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: adversarial-reports
          path: reports/allure-results/adversarial/
          if-no-files-found: warn

  redteam-live:
    needs: key_check
    if: needs.key_check.outputs.has_key == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Promptfoo live red-team eval
        env:
          VERITY_ZAI_API_KEY: ${{ secrets.VERITY_ZAI_API_KEY }}
          VERITY_OPENROUTER_API_KEY: ${{ secrets.VERITY_OPENROUTER_API_KEY }}
          VERITY_TOGETHER_API_KEY: ${{ secrets.VERITY_TOGETHER_API_KEY }}
          VERITY_NVIDIA_API_KEY: ${{ secrets.VERITY_NVIDIA_API_KEY }}
          VERITY_GOOGLE_API_KEY: ${{ secrets.VERITY_GOOGLE_API_KEY }}
          VERITY_CASSETTE_MODE: off
        run: |
          mkdir -p reports/redteam
          npx --yes promptfoo@0.121.17 eval \
            --config promptfoo/redteam.yaml \
            --output reports/redteam/results.json

      - name: Upload red-team report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: redteam-report
          path: reports/redteam/

  calibrate-live:
    needs: key_check
    if: needs.key_check.outputs.has_key == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Live calibration run
        env:
          VERITY_ZAI_API_KEY: ${{ secrets.VERITY_ZAI_API_KEY }}
          VERITY_OPENROUTER_API_KEY: ${{ secrets.VERITY_OPENROUTER_API_KEY }}
          VERITY_TOGETHER_API_KEY: ${{ secrets.VERITY_TOGETHER_API_KEY }}
          VERITY_NVIDIA_API_KEY: ${{ secrets.VERITY_NVIDIA_API_KEY }}
          VERITY_GOOGLE_API_KEY: ${{ secrets.VERITY_GOOGLE_API_KEY }}
        run: |
          mkdir -p reports
          PYTHONPATH=src uv run python scripts/run_calibration.py --record

      - name: Upload calibration report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: calibration-report
          path: docs/calibration-report.md
