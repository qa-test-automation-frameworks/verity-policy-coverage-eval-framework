    member_id: MBR-004
    tags: [limits, snf, control]
    behavior: answer
    ground_truth: "Skilled nursing facility stays are limited to 90 days per calendar year on all plans (Exclusions — Lifetime and Annual Limits)."
    must_contain: ["90 days"]
    numeric_expectations:
      - description: "SNF annual limit is exactly 90 days"
        comparator: eq
        value: 90
    expected_citations: [exclusions.md]
    expects_defect: false
    semantic_metrics: [answer_relevancy, faithfulness]
    notes: "Annual limit on skilled nursing facility stays."
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-07-02"
    evidence_ids: [ev-ctrl-snf-annual-limit]
    expectation_categories: [limits, amount, evidence]
    dataset_version: "1.0.0"


