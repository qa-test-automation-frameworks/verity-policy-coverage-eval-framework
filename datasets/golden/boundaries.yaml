  - id: ctrl-silver-deductible-exact-boundary
    query: "I have $1,500 of my $2,000 Silver deductible paid. What do I owe for a $500 claim?"
    member_id: MBR-001
    tags: [silver, deductible, boundary, tool-use, control]
    behavior: answer
    ground_truth: "The $500 claim exactly exhausts the remaining deductible; member pays $500, plan pays $0."
    must_contain: ["500"]
    expected_tool:
      name: coverage_calculator
      required_args: [claim_amount, plan_deductible, accrued_deductible, plan_oop_max, accrued_oop, coinsurance_member]
      expected_arg_values:
        claim_amount: 500.0
        plan_deductible: 2000.0
        accrued_deductible: 1500.0
        plan_oop_max: 6000.0
        accrued_oop: 1500.0
        coinsurance_member: 0.20
    expected_citations: [silver.md]
    expects_defect: false
    semantic_metrics: [task_completion]
    notes: "Numerical boundary case: claim amount exactly equals remaining deductible."
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-07-01"
    evidence_ids: [ev-ctrl-silver-deductible-exact-boundary]
    expectation_categories: [tool_behavior, amount, limits, evidence]
    dataset_version: "1.0.0"


  - id: ctrl-bronze-oop-exact-boundary
    query: "I'm at $7,600 of my $8,000 Bronze out-of-pocket max, deductible met. What do I owe for a $1,000 claim?"
    member_id: MBR-003
    tags: [bronze, oop-max, boundary, tool-use, control]
    behavior: answer
    ground_truth: "40% coinsurance on $1,000 is $400, which brings accrued OOP to exactly $8,000 — at, not over, the cap."
    must_contain: ["400", "8,000"]
    numeric_expectations:
      - description: "member owes exactly $400 (40% coinsurance on $1,000)"
        comparator: eq
        value: 400
      - description: "resulting accrued OOP is at the $8,000 cap, not over it"
        comparator: range
        min_value: 8000
        max_value: 8000
    expected_tool:
      name: coverage_calculator
      required_args: [claim_amount, plan_deductible, accrued_deductible, plan_oop_max, accrued_oop, coinsurance_member]
      expected_arg_values:
        claim_amount: 1000.0
        plan_deductible: 4000.0
        accrued_deductible: 4000.0
        plan_oop_max: 8000.0
        accrued_oop: 7600.0
        coinsurance_member: 0.40
    expected_citations: [bronze.md]
    expects_defect: false
    semantic_metrics: [task_completion]
    notes: "Numerical boundary case: member cost lands exactly at the OOP maximum (not over it)."
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-07-01"
    evidence_ids: [ev-ctrl-bronze-oop-exact-boundary]
    expectation_categories: [tool_behavior, amount, limits, evidence]
    dataset_version: "1.0.0"

  # ── Paraphrase variants of seeded defects (robustness) ───────────────────
  # Each of the 8 seeded defects previously had exactly one query phrasing.
  # A model could pass every case here and still fail a trivial rephrase of
  # the same question, so these -v2 cases exercise the same defect and the
  # same detector via different wording, not a new failure mode.


  - id: ctrl-snf-annual-limit
