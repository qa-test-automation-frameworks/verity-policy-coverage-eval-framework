cases:

  - id: ctrl-silver-physical-therapy-limit
    query: "How many physical therapy sessions does Silver cover, and what is the copay?"
    member_id: MBR-001
    tags: [silver, physical-therapy, annual-limit, copay, control]
    behavior: answer
    ground_truth: "Silver covers up to 45 physical therapy sessions per calendar year at a $40 copay per session."
    must_contain: ["45", "40"]
    expected_citations: [silver.md]
    expects_defect: false
    semantic_metrics: [faithfulness, answer_relevancy]
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-06-15"
    evidence_ids: [ev-ctrl-silver-physical-therapy-limit]
    expectation_categories: [evidence, amount]
    dataset_version: "1.0.0"


