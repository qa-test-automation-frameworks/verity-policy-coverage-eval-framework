  - id: ctrl-missing-prior-auth-status
    query: "Has my upcoming knee replacement surgery been prior-authorized?"
    member_id: MBR-002
    tags: [missing-information, uncertainty, prior-authorization, control]
    behavior: answer
    ground_truth: >
      The policy documents state that surgical benefits require prior authorization, but a
      member's own authorization status is account-specific claims data, not something the
      plan benefit summaries record. The assistant should say it cannot confirm this
      member's authorization status from the available documents and should direct the
      member to plan support.
    must_contain: ["cannot confirm"]
    must_contain_any:
      - ["contact member services", "contact plan support", "call member services"]
    expected_citations: [gold.md]
    expects_defect: false
    semantic_metrics: [faithfulness]
    notes: >
      Missing-information behavior distinct from ctrl-missing-acupuncture-policy: the
      *policy rule* (prior auth required) is in the corpus, but this specific member's
      authorization status is not — the assistant must not fabricate a yes/no answer
      about the member's own case.
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-07-03"
    evidence_ids: [ev-ctrl-missing-prior-auth-status]
    expectation_categories: [uncertainty, evidence]
    dataset_version: "1.0.0"


