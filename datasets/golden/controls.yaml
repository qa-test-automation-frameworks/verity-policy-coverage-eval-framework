  - id: ctrl-silver-awkward-decimal-cost-tool
    query: "How much will I owe for a $1,750.55 outpatient procedure on my Silver plan?"
    member_id: MBR-001
    tags: [silver, cost-calculation, tool-use, control]
    behavior: answer
    ground_truth: >
      MBR-001 Silver has $1,200 remaining deductible ($800 of the $2,000 deductible already
      met). On a $1,750.55 claim, the remaining deductible ($1,200) applies first; the
      remaining $550.55 is subject to 20% member coinsurance ($110.11), so the member owes
      $1,310.11 total and the plan pays $440.44.
    must_contain: ["1,310.11"]
    numeric_expectations:
      - description: "member owes exactly $1,310.11 (remaining deductible plus 20% coinsurance)"
        comparator: eq
        value: 1310.11
        tolerance: 0.01
    expected_tool:
      name: coverage_calculator
      required_args: [claim_amount, plan_deductible, accrued_deductible, plan_oop_max, accrued_oop, coinsurance_member]
      expected_arg_values:
        claim_amount: 1750.55
        plan_deductible: 2000.0
        accrued_deductible: 800.0
        plan_oop_max: 6000.0
        accrued_oop: 800.0
        coinsurance_member: 0.20
    expected_citations: [silver.md]
    expects_defect: false
    semantic_metrics: [task_completion]
    notes: >
      Non-round claim amount and resulting cent-level coinsurance split, exercising the
      calculator's decimal handling end-to-end through the agent and tool path rather than
      only the round dollar amounts used elsewhere in the golden dataset.
    risk_weight: "medium"
    owner: "policy-eval-team"
    last_reviewed: "2026-07-03"
    evidence_ids: [ev-ctrl-silver-awkward-decimal-cost-tool]
    expectation_categories: [tool_behavior, amount, evidence]
    dataset_version: "1.0.0"


